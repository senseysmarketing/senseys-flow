name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy changed Edge Functions
        run: |
          # Deploy only functions whose files changed in this push
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep '^supabase/functions/' \
            | awk -F'/' '{print $3}' \
            | sort -u \
            | grep -v '^$')

          if [ -z "$CHANGED" ]; then
            echo "No Edge Function changes detected."
            exit 0
          fi

          echo "Functions to deploy: $CHANGED"
          for fn in $CHANGED; do
            echo "Deploying $fn..."
            supabase functions deploy "$fn" \
              --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
              --no-verify-jwt || true
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
