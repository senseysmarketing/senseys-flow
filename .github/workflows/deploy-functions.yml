name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy changed Edge Functions
        run: |
          # Detect which function directories changed in this push
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep '^supabase/functions/' \
            | awk -F'/' '{print $3}' \
            | sort -u \
            | grep -v '^$' \
            | grep -v '_shared')

          if [ -z "$CHANGED" ]; then
            echo "No Edge Function changes detected."
            exit 0
          fi

          echo "Functions to deploy: $CHANGED"
          for fn in $CHANGED; do
            echo "Deploying $fn..."
            # verify_jwt setting is read automatically from supabase/config.toml
            supabase functions deploy "$fn" \
              --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
