name: Deploy Supabase Edge Functions & Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply pending database migrations
        run: |
          CHANGED_MIGRATIONS=$(git diff --name-only HEAD~1 HEAD \
            | grep '^supabase/migrations/' || true)

          if [ -z "$CHANGED_MIGRATIONS" ]; then
            echo "No migration changes detected, skipping db push."
          else
            echo "New migrations detected:"
            echo "$CHANGED_MIGRATIONS"
            echo "Running supabase db push..."
            supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
            echo "✅ Migrations applied."
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy changed Edge Functions
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep '^supabase/functions/' \
            | awk -F'/' '{print $3}' \
            | sort -u \
            | grep -v '^$' \
            | grep -v '_shared')

          if [ -z "$CHANGED" ]; then
            echo "No Edge Function changes detected, skipping deploy."
          else
            echo "Functions to deploy: $CHANGED"
            for fn in $CHANGED; do
              echo "Deploying $fn..."
              supabase functions deploy "$fn" \
                --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
              echo "✅ $fn deployed."
            done
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
